name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm --workspace @jilson/core run build

      - name: Typecheck client
        run: npm --workspace @jilson/client run typecheck

      - name: Typecheck server
        run: npm --workspace @jilson/server run typecheck

      - name: Build client
        run: npm --workspace @jilson/client run build

      - name: Build server
        run: npm --workspace @jilson/server run build
